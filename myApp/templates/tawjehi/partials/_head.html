{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tawjehi Exam Preparation - Fluentory</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&family=Amiri:wght@700&display=swap" rel="stylesheet">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        'ink-deep': '#3C3A4C',
                        'teal-soft': '#52A8B5',
                        'blue-soft': '#4492B3',
                        'coral-cta': '#DE604D',
                        'success-soft': '#2C9F5F',
                        'navy-deep': '#0c1b2a',
                        'warm-beige': '#f5f1ea',
                        'soft-gold': '#c9a227',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'DM Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--cream);
            color: var(--ink);
        }

        html {
            scroll-behavior: smooth;
        }

        :root {
            --ink: #0e0e0e;
            --gold: #c9a84c;
            --gold-light: #e8d08a;
            --teal: #1a5c5c;
            --rust: #b84a2a;
            --cream: #faf7f0;
            --muted: #6b6560;
            --card-border: #e0d8c8;
        }

        .hero {
            position: relative;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            overflow: hidden;
            background: var(--ink);
        }

        .hero-bg-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.06;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 39px, #c9a84c 39px, #c9a84c 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, #c9a84c 39px, #c9a84c 40px);
        }

        .hero-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }
        .hero-orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.25), transparent 70%);
            top: -100px;
            left: -100px;
        }
        .hero-orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(26, 92, 92, 0.4), transparent 70%);
            bottom: -50px;
            right: 200px;
        }

        .hero-left {
            position: relative;
            padding: 80px 60px 80px 80px;
            z-index: 2;
            animation: fadeUp 1s ease both;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(201, 168, 76, 0.15);
            border: 1px solid rgba(201, 168, 76, 0.4);
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold-light);
            margin-bottom: 32px;
        }
        .hero-eyebrow::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
            animation: pulse 2s infinite;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 4.5vw, 5rem);
            font-weight: 900;
            line-height: 1.05;
            color: #fff;
            margin-bottom: 24px;
        }
        .hero-title .accent {
            color: var(--gold);
            display: block;
            font-style: italic;
        }

        .hero-subtitle {
            font-size: 1.05rem;
            line-height: 1.75;
            color: rgba(255, 255, 255, 0.6);
            max-width: 460px;
            margin-bottom: 48px;
        }

        .hero-cta-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .hero-stats {
            display: flex;
            gap: 40px;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hero-stat strong {
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
        }
        .hero-stat span {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.45);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .hero-right {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            animation: fadeUp 1s 0.2s ease both;
        }

        .hero-card-stack {
            position: relative;
            width: 380px;
            height: 480px;
        }

        .subject-card {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(201, 168, 76, 0.25);
            border-radius: 16px;
            padding: 28px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .subject-card:hover {
            transform: translateY(-6px) scale(1.02);
        }
        .sc-main {
            width: 320px;
            top: 60px;
            left: 30px;
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.18), rgba(26, 92, 92, 0.18));
        }
        .sc-float-1 {
            width: 200px;
            top: 10px;
            right: -20px;
            background: rgba(26, 92, 92, 0.3);
            animation: float 4s ease-in-out infinite;
        }
        .sc-float-2 {
            width: 180px;
            bottom: 40px;
            left: -10px;
            background: rgba(184, 74, 42, 0.2);
            animation: float 5s 1s ease-in-out infinite;
        }
        .sc-float-3 {
            width: 160px;
            bottom: 80px;
            right: 0;
            background: rgba(201, 168, 76, 0.12);
            animation: float 4.5s 0.5s ease-in-out infinite;
        }
        .sc-icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }
        .sc-label {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: #fff;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .sc-sub {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.45);
        }
        .sc-score {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 14px;
        }
        .score-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            border-radius: 2px;
        }
        .score-val {
            font-size: 0.7rem;
            color: var(--gold-light);
            font-weight: 600;
        }

        .marquee-wrap {
            background: var(--gold);
            padding: 14px 0;
            overflow: hidden;
            white-space: nowrap;
        }
        .marquee-inner {
            display: inline-block;
            animation: marquee 18s linear infinite;
        }
        .marquee-item {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink);
            padding: 0 40px;
        }
        .marquee-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--ink);
            opacity: 0.4;
        }

        .subjects-section {
            background: var(--cream);
            padding: 100px 0;
        }
        .subjects-inner,
        .why-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 80px;
        }
        .subjects-header,
        .why-header {
            margin-bottom: 60px;
        }
        .section-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--teal);
            background: rgba(26, 92, 92, 0.08);
            border: 1px solid rgba(26, 92, 92, 0.2);
            padding: 5px 14px;
            border-radius: 100px;
            margin-bottom: 16px;
        }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 3.5vw, 3.2rem);
            line-height: 1.1;
            margin-bottom: 14px;
        }
        .section-title em {
            color: var(--teal);
            font-style: italic;
        }
        .section-lead {
            color: var(--muted);
            line-height: 1.8;
            max-width: 760px;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        .subject-tile {
            background: #fff;
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 30px;
            transition: all 0.3s ease;
        }
        .subject-tile:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }
        .tile-emoji {
            font-size: 2rem;
            margin-bottom: 12px;
            display: block;
        }
        .tile-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            margin-bottom: 10px;
        }
        .tile-desc {
            color: var(--muted);
            line-height: 1.7;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .tile-tag {
            display: inline-flex;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--teal);
            background: rgba(26, 92, 92, 0.1);
            border: 1px solid rgba(26, 92, 92, 0.2);
            border-radius: 100px;
            padding: 6px 12px;
        }

        .why-section {
            background: var(--ink);
            padding: 100px 0;
        }
        .why-header .section-tag {
            color: var(--gold);
            background: rgba(201, 168, 76, 0.1);
            border-color: rgba(201, 168, 76, 0.25);
        }
        .why-header .section-title {
            color: #fff;
        }
        .why-header .section-title em {
            color: var(--gold-light);
        }
        .why-header .section-lead {
            color: rgba(255, 255, 255, 0.6);
        }
        .why-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .why-item {
            background: #161616;
            border-radius: 14px;
            padding: 28px;
        }
        .why-num {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: rgba(201, 168, 76, 0.2);
            line-height: 1;
            margin-bottom: 12px;
        }
        .why-title {
            font-family: 'Playfair Display', serif;
            color: #fff;
            font-size: 1.25rem;
            margin-bottom: 8px;
        }
        .why-text {
            color: rgba(255, 255, 255, 0.72);
            line-height: 1.8;
            font-size: 0.9rem;
        }

        .cta-section {
            background: linear-gradient(135deg, var(--teal) 0%, #0d3535 100%);
            color: #fff;
            text-align: center;
            padding: 100px 30px;
        }
        .cta-inner {
            max-width: 760px;
            margin: 0 auto;
        }
        .cta-arabic {
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            color: rgba(201, 168, 76, 0.85);
            margin-bottom: 8px;
            direction: rtl;
        }
        .cta-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4vw, 3.2rem);
            margin-bottom: 16px;
        }
        .cta-title em {
            color: var(--gold-light);
            font-style: italic;
        }
        .cta-desc {
            color: rgba(255, 255, 255, 0.72);
            line-height: 1.8;
            margin-bottom: 28px;
        }

        .btn-primary,
        .btn-ghost,
        .btn-white,
        .btn-outline-white {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            border-radius: 8px;
            padding: 14px 26px;
            transition: 0.2s ease;
        }
        .btn-primary {
            background: var(--gold);
            border: 2px solid var(--gold);
            color: var(--ink);
            font-weight: 700;
        }
        .btn-ghost {
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
        }
        .btn-white {
            background: #fff;
            border: 2px solid #fff;
            color: var(--teal);
            font-weight: 700;
        }
        .btn-outline-white {
            border: 2px solid rgba(255, 255, 255, 0.45);
            color: #fff;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .reveal {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .reveal.visible {
            opacity: 1;
            transform: none;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        @keyframes marquee {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        @media (max-width: 1024px) {
            .hero { grid-template-columns: 1fr; }
            .hero-right { display: none; }
            .hero-left { padding: 80px 40px; }
            .subjects-grid { grid-template-columns: repeat(2, 1fr); }
            .why-grid { grid-template-columns: 1fr; }
            .subjects-inner, .why-inner { padding: 0 40px; }
        }
        @media (max-width: 680px) {
            .hero-stats { flex-direction: column; gap: 16px; }
            .hero-cta-row { flex-direction: column; align-items: flex-start; }
            .subjects-grid { grid-template-columns: 1fr; }
            .subjects-inner, .why-inner { padding: 0 24px; }
        }
    </style>
</head>
