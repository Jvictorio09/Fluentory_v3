<section class="cta-section" id="cta">
    <div class="cta-inner">
        <div class="cta-arabic">النجاح بدأ من هنا</div>
        <h2 class="cta-title">Ready to <em>Excel</em> in Your Tawjehi Exams?</h2>
        <p class="cta-desc">Join thousands of students across Jordan who are preparing smarter with Tawjihee.</p>
        <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;">
            {% if user.is_authenticated %}
            <a href="{% url 'student_dashboard' %}" class="btn-white">Browse All Courses</a>
            {% else %}
            <a href="{% url 'register' %}" class="btn-white">Get Started Free</a>
            <a href="{% url 'login' %}" class="btn-outline-white">Already Have an Account?</a>
            {% endif %}
        </div>
    </div>
</section>
