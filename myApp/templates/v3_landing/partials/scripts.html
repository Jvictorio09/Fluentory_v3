<script>
  function toggleMobileMenu(event) {
    event.preventDefault();
    const menu = document.getElementById('mobile-menu');
    const toggleBtn = event.currentTarget;
    if (!menu || !toggleBtn) return;
    const willOpen = !menu.classList.contains('open');
    menu.classList.toggle('open', willOpen);
    toggleBtn.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
  }

  window.addEventListener('scroll', () => {
    const nav = document.getElementById('nav');
    if (nav) {
      nav.classList.toggle('shadow', window.scrollY > 20);
    }
  });

  document.addEventListener('click', (event) => {
    const menu = document.getElementById('mobile-menu');
    const toggleBtn = document.querySelector('.mobile-tog');
    if (!menu || !toggleBtn || !menu.classList.contains('open')) return;
    if (!menu.contains(event.target) && !toggleBtn.contains(event.target)) {
      menu.classList.remove('open');
      toggleBtn.setAttribute('aria-expanded', 'false');
    }
  });

  document.querySelectorAll('#mobile-menu a').forEach((link) => {
    link.addEventListener('click', () => {
      const menu = document.getElementById('mobile-menu');
      const toggleBtn = document.querySelector('.mobile-tog');
      if (menu) menu.classList.remove('open');
      if (toggleBtn) toggleBtn.setAttribute('aria-expanded', 'false');
    });
  });

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold: 0.1, rootMargin: '0px 0px -48px 0px' });
  document.querySelectorAll('.fade').forEach(el => obs.observe(el));

  function toggleFaq(btn) {
    const item = btn.closest('.fi');
    const body = item.querySelector('.fi-body');
    const isOpen = item.classList.contains('open');
    document.querySelectorAll('.fi.open').forEach(i => {
      i.classList.remove('open');
      i.querySelector('.fi-body').style.display = 'none';
    });
    if (!isOpen) { item.classList.add('open'); body.style.display = 'block'; }
  }
</script>
